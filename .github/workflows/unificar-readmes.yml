name: Unificar y Normalizar READMEs

on:
  workflow_dispatch:

jobs:
  unify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar Script de Unificación
        run: |
          python3 -c "
          import os, re

          base_path = 'docs/codigos'
          for root, dirs, files in os.walk(base_path):
              # Identificar archivos existentes ignorando mayúsculas
              readmes = [f for f in files if f.lower() == 'readme.md']
              
              content = ''
              # Si hay archivos, leemos el que tenga contenido real
              for r in readmes:
                  path = os.path.join(root, r)
                  with open(path, 'r', encoding='utf-8') as f:
                      temp_content = f.read()
                      if len(temp_content) > len(content):
                          content = temp_content
                  
                  # Borramos el archivo físico para limpiar (luego crearemos el definitivo)
                  os.remove(path)

              # Definir título y descripción limpia
              folder_name = os.path.basename(root).replace('-', ' ').title()
              text_only = re.sub(r'---.*?---', '', content, flags=re.DOTALL)
              text_only = re.sub(r'#+.*', '', text_only).strip()
              description = (text_only[:150] + '...').replace('\"', '').replace('\n', ' ') if len(text_only) > 20 else 'Documentación técnica ABAP'

              # Construir Frontmatter SEGURO (con comillas)
              new_frontmatter = (
                  '---\n'
                  f'title: \"{folder_name}\"\n'
                  f'description: \"{description}\"\n'
                  'fuente: \"Archivo Histórico SAP\"\n'
                  '---\n\n'
              )

              # Limpiar el cuerpo del mensaje de frontmatters viejos
              body = re.sub(r'---.*?---', '', content, flags=re.DOTALL).strip()
              
              # Si la carpeta está vacía de texto, intentamos linkear el .abap
              if not body:
                  abap_files = [f for f in os.listdir(root) if f.endswith('.abap')]
                  if abap_files:
                      body = f'# {folder_name}\n\nCódigo fuente del programa:\n\n<<< @/codigos/{os.path.basename(root)}/{abap_files[0]}'

              # Guardar siempre como README.md (Mayúsculas)
              with open(os.path.join(root, 'README.md'), 'w', encoding='utf-8') as f:
                  f.write(new_frontmatter + body)
          "

      - name: Commit y Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🧹 Unificación de READMEs y limpieza de duplicados"
